name: CI / Back-end

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  backend:
    name: CI / Back-end
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install (all deps, incl. dev)
        working-directory: backend
        run: npm ci

      - name: Sanity check
        working-directory: backend
        run: |
          echo "PWD=$(pwd)"
          node -v
          npm -v
          ls -la node_modules/.bin | sed -n '1,120p' || true
          if [ -x node_modules/.bin/eslint ]; then
            ./node_modules/.bin/eslint --version
          else
            echo "::error::ESLint introuvable dans node_modules/.bin"
            exit 1
          fi

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Tests (if present)
        working-directory: backend
        run: npm test --if-present

      - name: Build (if present)
        working-directory: backend
        run: npm run build --if-present

      # Choisis OPTION A (strict) ou OPTION B (report only)

      # OPTION A — échoue si High/Critical
      - name: Audit production deps (fail on high+)
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      # OPTION B — informer seulement (ne bloque pas la PR)
      # - name: Audit production deps (report only)
      #   working-directory: backend
      #   run: npm audit --omit=dev || echo "::warning::Vulnérabilités détectées (voir logs)."
