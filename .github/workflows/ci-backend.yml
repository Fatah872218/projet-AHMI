name: CI / Back-end

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: CI / Back-end
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install (all deps, incl. dev)
        run: npm ci

      - name: Sanity check
        run: |
          echo "PWD=$(pwd)"
          node -v
          npm -v
          if [ -x node_modules/.bin/eslint ]; then
            ./node_modules/.bin/eslint --version
          else
            echo "::error::ESLint introuvable dans node_modules/.bin"
            exit 1
          fi

      - name: Lint
        run: npm run lint
        # ou, si tu veux zéro warning en CI :
        # run: npm run lint:ci

      - name: Tests (if present)
        run: npm test --if-present

      - name: Build (if present)
        run: npm run build --if-present

      - name: Audit production deps (fail on high+)
        run: npm audit --omit=dev --audit-level=high
        # Variante non bloquante :
        # run: npm audit --omit=dev || echo "::warning::Vulnérabilités détectées (voir logs)."
