name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: CI / Back-end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (backend)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Sanity check (backend)
        run: |
          echo "PWD=$(pwd)"
          ls -la
          test -f package.json || (echo " pas de package.json"; exit 1)
          test -f package-lock.json || (echo " pas de package-lock.json"; exit 1)
          node -e "console.log('lockfileVersion:', require('./package-lock.json').lockfileVersion)"

      - name: Install (backend)
        run: npm ci

      - name: Lint (backend)
        run: npm run lint --if-present

      # - name: Test (backend)
      #   run: npm test --if-present

      # - name: Build (backend)
      #   run: npm run build --if-present

  frontend:
    name: CI / Front-end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sanity check (frontend)
        run: |
          echo "PWD=$(pwd)"
          ls -la
          test -f package.json || (echo " pas de package.json"; exit 1)
          test -f package-lock.json || (echo " pas de package-lock.json"; exit 1)
          node -e "console.log('lockfileVersion:', require('./package-lock.json').lockfileVersion)"

      - name: Install (frontend)
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint --if-present

      - name: Test (frontend)
        run: npm run test --if-present

       - name: Build (frontend)
         run: npm run build --if-present
