openapi: 3.1.0
info:
  title: AHMI API -Auth
  version: 1.0.0
  description: Authentification, rôles, événements, réservations.Endpoints d’authentification et d’activation. Conçus pour être simples à tester (curl) et alignés CCP2 (sécurité, docs, erreurs explicites).
servers:
  - url: http://localhost:5000/api
    description: Dev local
security:
  - cookieAuth: []
  - bearerAuth: []
tags:
  - name: Auth
  - name: Events
  - name: Reservations
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Inscription + envoi mail d’activation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/AuthRegisterRequest"}
      responses:
        "201":
          description: Utilisateur créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  utilisateur: {$ref: "#/components/schemas/UserPublic"}
                  token:
                    type: string
                    description: "Optionnel si vous retournez le JWT en JSON (le cookie httpOnly est recommandé)"
        "400": {description: Données invalides}
  /auth/activate/{code}:
    get:
      tags: [Auth]
      summary: Active le compte
      parameters:
        - in: path
          name: code
          required: true
          schema: {type: string}
      responses:
        "200": {description: Compte activé}
        "400": {description: Lien invalide ou expiré}
  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion (dépose un cookie httpOnly "tokenA")
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/AuthLoginRequest"}
      responses:
        "200":
          description: Connecté
          headers:
            Set-Cookie:
              description: "tokenA=httpOnly; SameSite=Strict; Secure en prod"
              schema: {type: string}
          content:
            application/json:
              schema:
                type: object
                properties:
                  utilisateur: {$ref: "#/components/schemas/UserPublic"}
                  token:
                    type: string
                    description: "Optionnel, si vous exposez aussi le JWT côté JSON"
        "401": {description: Identifiants invalides}
  /events:
    get:
      tags: [Events]
      summary: Liste publique (seulement les approuvés)
      responses:
        "200":
          description: Liste d’événements
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Event"}
    post:
      tags: [Events]
      summary: Créer un événement
      security: [{cookieAuth: []}, {bearerAuth: []}]
      x-required-roles: ["partner", "admin"]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/EventCreateRequest"}
      responses:
        "201": {description: Événement créé, content: {application/json: {schema: {$ref: "#/components/schemas/Event"}}}}
        "400": {description: Données invalides}
        "401": {description: Non authentifié}
        "403": {description: Rôle insuffisant}
  /events/{id}:
    get:
      tags: [Events]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string}
      responses:
        "200": {description: Détail, content: {application/json: {schema: {$ref: "#/components/schemas/Event"}}}}
        "404": {description: Introuvable}
      put:
    tags: [Events]
    summary: Mettre à jour (propriétaire ou admin)
    security: [{cookieAuth: []}, {bearerAuth: []}]
    x-ownership: ownerOrAdmin
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EventUpdateRequest"
    responses:
      "200":
        description: Mis à jour
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Event"
      "403":
        description: Accès refusé
      "404":
        description: Introuvable
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: tokenA
      description: JWT en cookie HttpOnly `tokenA`
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT transmis via `Authorization: Bearer <token>`'
  schemas:
    AuthUtilisateurPublic:
      type: object
      required: [_id, nom, email, role, isActif]
      properties:
        _id:
          type: string
          example: "68b334c74f5d74ce8d8b4d11"
        nom:
          type: string
          example: "Thierry"
        email:
          type: string
          format: email
          example: "thierry@gmail.com"
        role:
          type: string
          enum: [admin, user]
          example: "admin"
        isActif:
          type: boolean
          example: true
        dateInscription:
          type: string
          format: date-time
    AuthLoginRequest:
      type: object
      required: [email, motDePasse]
      properties:
        email:
          type: string
          format: email
          example: thierry@gmail.com
        motDePasse:
          type: string
          example: Mot2Passe!
    AuthLoginResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: '#/components/schemas/AuthUtilisateurPublic'
        token:
          type: string
          description: "JWT (également déposé en cookie HttpOnly `tokenA` si activé)"
    AuthMessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Opération effectuée."
    AuthErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Erreur"
    LoginRequest:
      $ref: '#/components/schemas/AuthLoginRequest'
    LoginResponse:
      $ref: '#/components/schemas/AuthLoginResponse'
    UtilisateurPublic:
      $ref: '#/components/schemas/AuthUtilisateurPublic'
    MessageResponse:
      $ref: '#/components/schemas/AuthMessageResponse'
    ErrorResponse:
      $ref: '#/components/schemas/AuthErrorResponse'
    # --------- AUTH ----------
    AuthRegisterRequest:
      type: object
      required: [nom, email, motDePasse]
      properties:
        nom:
          type: string
          example: "Thierry"
        email:
          type: string
          format: email
          example: "thierry@gmail.com"
        motDePasse:
          type: string
          example: "Mot2Passe!"
    # Alias pour compat des refs existantes
    UserPublic:
      $ref: '#/components/schemas/AuthUtilisateurPublic'
    # --------- EVENTS ----------
    Event:
      type: object
      required: [_id, titre, dateDebut]
      properties:
        _id:
          type: string
          example: "65f1c0a2b1d2e30012ab34cd"
        titre:
          type: string
          example: "Atelier AHMI"
        description:
          type: string
          example: "Présentation et Q/R"
        dateDebut:
          type: string
          format: date-time
          example: "2025-09-15T18:00:00Z"
        dateFin:
          type: string
          format: date-time
          example: "2025-09-15T20:00:00Z"
        lieu:
          type: string
          example: "Salle Polyvalente"
    EventCreateRequest:
      type: object
      required: [titre, dateDebut]
      properties:
        titre:
          type: string
        description:
          type: string
        dateDebut:
          type: string
          format: date-time
        dateFin:
          type: string
          format: date-time
        lieu:
          type: string
    EventUpdateRequest:
      type: object
      properties:
        titre:
          type: string
        description:
          type: string
        dateDebut:
          type: string
          format: date-time
        dateFin:
          type: string
          format: date-time
        lieu:
          type: string
